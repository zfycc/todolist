<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="container mx-auto px-4 py-8 max-w-md">
    <div class="bg-white rounded-lg shadow-lg p-6">
      <!-- 标题 -->
      <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">Todo List</h1>
      
      <!-- 任务输入区域 -->
      <div class="flex mb-6">
        <input type="text" id="todo-input" placeholder="添加新任务..." 
               class="flex-1 border border-gray-300 rounded-l-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
        <button id="add-btn" class="bg-green-500 text-white px-4 py-2 rounded-r-lg hover:bg-green-600 transition-colors">
          <i class="fa fa-plus"></i>
        </button>
      </div>
      
      <!-- 筛选区域 -->
      <div class="flex justify-between mb-4">
        <button class="filter-btn active px-3 py-1 rounded-md text-sm" data-filter="all">
          全部
        </button>
        <button class="filter-btn px-3 py-1 rounded-md text-sm" data-filter="active">
          待办
        </button>
        <button class="filter-btn px-3 py-1 rounded-md text-sm" data-filter="completed">
          已完成
        </button>
      </div>
      
      <!-- 任务列表 -->
      <ul id="todo-list" class="mb-6">
        <!-- 任务项将通过 JavaScript 动态添加 -->
      </ul>
      
      <!-- 空状态提示 -->
      <div id="empty-tip" class="text-center text-gray-500 py-8">
        暂无任务
      </div>
      
      <!-- 统计信息 -->
      <div class="text-center text-gray-600 text-sm mt-4">
        共 <span id="total-count">0</span> 项，已完成 <span id="completed-count">0</span> 项
      </div>
    </div>
  </div>
  
  <!-- 编辑任务模态框 -->
  <div id="edit-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-lg p-6 w-11/12 max-w-md">
      <h2 class="text-xl font-bold mb-4">编辑任务</h2>
      <input type="text" id="edit-input" class="w-full border border-gray-300 rounded-lg px-4 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-green-500">
      <div class="flex justify-end space-x-2">
        <button id="cancel-edit" class="px-4 py-2 bg-gray-300 text-gray-800 rounded-lg hover:bg-gray-400 transition-colors">
          取消
        </button>
        <button id="save-edit" class="px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 transition-colors">
          保存
        </button>
      </div>
    </div>
  </div>
  
  <!-- 确认删除模态框 -->
  <div id="delete-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-lg p-6 w-11/12 max-w-md">
      <h2 class="text-xl font-bold mb-4">确认删除</h2>
      <p class="mb-4">确定要删除这个任务吗？</p>
      <div class="flex justify-end space-x-2">
        <button id="cancel-delete" class="px-4 py-2 bg-gray-300 text-gray-800 rounded-lg hover:bg-gray-400 transition-colors">
          取消
        </button>
        <button id="confirm-delete" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors">
          删除
        </button>
      </div>
    </div>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
